<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <title>Cat Survivors — miagola e sopravvivi</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100vh;   /* fallback per browser vecchi */
        height: 100dvh;  /* area realmente visibile su mobile (esclude la barra del browser) */
        overflow: hidden;
        background: #0a0d09;
      }
      #game {
        display: block;
        width: 100vw;
        height: 100vh;   /* fallback per browser vecchi */
        width: 100dvw;
        height: 100dvh;  /* tiene conto della chrome del browser mobile: niente taglio in fondo */
        /* il canvas è pixel-perfect: niente smoothing del browser sull'upscale */
        image-rendering: auto;
        background: #131a12;
        cursor: crosshair;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }
      @media (pointer: coarse) {
        #game { cursor: none; }
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
