<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <title>Cat Survivors — meow and survive</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100vh;   /* fallback per browser vecchi */
        height: 100dvh;  /* area realmente visibile su mobile (esclude la barra del browser) */
        overflow: hidden;
        background: #0a0d09;
      }
      #game {
        display: block;
        width: 100vw;
        height: 100vh;   /* fallback per browser vecchi */
        width: 100dvw;
        height: 100dvh;  /* tiene conto della chrome del browser mobile: niente taglio in fondo */
        /* il canvas è pixel-perfect: niente smoothing del browser sull'upscale */
        image-rendering: auto;
        background: #131a12;
        cursor: crosshair;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }
      @media (pointer: coarse) {
        #game { cursor: none; }
      }
      /* Input reale usato solo per far comparire la tastiera software su mobile
         quando si digita il codice stanza: invisibile ma NON display:none (servono
         focus e tastiera). Il campo visibile resta disegnato sul canvas. */
      #roomInput {
        position: fixed;
        top: 0;
        left: 0;
        width: 1px;
        height: 1px;
        opacity: 0;
        border: 0;
        padding: 0;
        background: transparent;
        color: transparent;
        caret-color: transparent;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <input id="roomInput" type="text" inputmode="text" autocapitalize="characters"
           autocomplete="off" autocorrect="off" spellcheck="false" maxlength="8" aria-hidden="true" />
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
